<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MediMonitor</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar glass" id="sidebar">
            <div class="logo">
                <img src="images/logo.png" alt="Logo">
                <span>MediMonitor</span>
            </div>
            <nav style="margin-top: 2rem;">
                <ul style="flex-direction: column;">
                    <li><a href="#" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="#" id="logout-btn" style="cursor: pointer;"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="glass" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <button id="menu-toggle" class="btn" style="display: none; font-size: 1.5rem;"><i class="fas fa-bars"></i></button>
                <h2>Admin Panel - Hospital Control</h2>
                <div id="admin-info">Admin Access</div>
            </header>

            <div class="stats-grid">
                <div class="stat-card glass">
                    <p>Total Patients</p>
                    <h3 id="admin-stat-patients">0</h3>
                </div>
                <div class="stat-card glass">
                    <p>Occupied Beds</p>
                    <h3 id="admin-stat-occupied">0</h3>
                </div>
                <div class="stat-card glass">
                    <p>Available Beds</p>
                    <h3 id="admin-stat-available">0</h3>
                </div>
                <div class="stat-card glass">
                    <p>Critical Alert Cases</p>
                    <h3 id="admin-stat-critical" style="color: var(--danger-color);">0</h3>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <div class="glass" style="padding: 2rem;">
                    <h3>Pending Allocations (Awaiting Bed/Doctor)</h3>
                    <div id="pending-allocation-list" style="max-height: 400px; overflow-y: auto; margin-top: 1rem;">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="glass" style="padding: 2rem;">
                    <h3>Add New Staff (Doctor/Nurse)</h3>
                    <form id="add-staff-form" style="margin-top: 1rem;">
                        <select id="s-role" class="glass" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem;" onchange="this.nextElementSibling.style.display = this.value === 'doctor' ? 'block' : 'none'">
                            <option value="nurse">Nurse</option>
                            <option value="doctor">Doctor</option>
                        </select>
                        <div id="special-field" style="display: none;">
                            <input type="text" id="s-special" placeholder="Specialization (for Doctors)" class="glass" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem;">
                        </div>
                        <input type="text" id="s-name" placeholder="Full Name" class="glass" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem;" required>
                        <input type="text" id="s-username" placeholder="Username" class="glass" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem;" required>
                        <input type="password" id="s-password" placeholder="Password" class="glass" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem;" required>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
                    </form>
                </div>
            </div>

            <div class="glass" style="padding: 2rem; margin-top: 2rem;">
                <h3>Current Resource Allocation (Beds)</h3>
                <div id="bed-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem;">
                    <!-- List populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
