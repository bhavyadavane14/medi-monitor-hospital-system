<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediMonitor</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">

    <div class="glass" style="padding: 3rem; width: 400px; text-align: center;">
        
        <!-- LOGO -->
        <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
            <img src="images/logo.png" alt="Logo">
            <span>MediMonitor</span>
        </div>

        <h2 style="margin-bottom: 1.5rem;">Secure Login</h2>

        <!-- LOGIN FORM -->
        <form id="login-form">
            
            <div style="margin-bottom: 1rem; text-align: left;">
                <label>Username</label>
                <input type="text" id="username" class="glass"
                    style="width: 100%; padding: 0.8rem; margin-top: 5px; border: 1px solid #ddd;"
                    required>
            </div>

            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label>Password</label>
                <input type="password" id="password" class="glass"
                    style="width: 100%; padding: 0.8rem; margin-top: 5px; border: 1px solid #ddd;"
                    required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Enter Dashboard
            </button>
        </form>

        <!-- ERROR MESSAGE -->
        <div id="login-error" style="color: red; margin-top: 1rem; display: none;"></div>

        <!-- DEMO USERS -->
        <div style="margin-top: 2rem; font-size: 0.8rem; color: gray;">
            <p>Admin: admin / admin123</p>
            <p>Nurse: nurse1 / nurse1123</p>
            <p>Doctor: doctor1 / doctor1123</p>
        </div>

    </div>

    <!-- ❌ REMOVE THIS (won’t work on Vercel) -->
    <!-- <script src="/socket.io/socket.io.js"></script> -->

    <!-- ✅ ADD SOCKET FROM BACKEND -->
    <script src="https://medi-monitor-backend.onrender.com/socket.io/socket.io.js"></script>

    <script>
        const BACKEND_URL = "https://medi-monitor-backend.onrender.com";

        // LOGIN HANDLER
        document.getElementById("login-form").addEventListener("submit", async function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorDiv = document.getElementById("login-error");

            try {
                const res = await fetch(`${BACKEND_URL}/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.success) {
                    // redirect to correct dashboard
                    window.location.href = data.redirect;
                } else {
                    errorDiv.innerText = "Invalid username or password";
                    errorDiv.style.display = "block";
                }

            } catch (err) {
                errorDiv.innerText = "Server not responding. Please wait 30 seconds...";
                errorDiv.style.display = "block";
            }
        });

        // SOCKET CONNECTION (for alerts)
        const socket = io(BACKEND_URL);

        socket.on("connect", () => {
            console.log("Connected to backend");
        });
    </script>

</body>
</html>
