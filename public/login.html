<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediMonitor</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body style="display: flex; align-items: center; justify-content: center;">
    <div class="glass" style="padding: 3rem; width: 400px; text-align: center;">
        <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
            <img src="images/logo.png" alt="Logo">
            <span>MediMonitor</span>
        </div>
        <h2 style="margin-bottom: 1.5rem;">Secure Login</h2>
        <form id="login-form">
            <div style="margin-bottom: 1rem; text-align: left;">
                <label>Username</label>
                <input type="text" id="username" class="glass" style="width: 100%; padding: 0.8rem; margin-top: 5px; border: 1px solid #ddd;" required>
            </div>
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label>Password</label>
                <input type="password" id="password" class="glass" style="width: 100%; padding: 0.8rem; margin-top: 5px; border: 1px solid #ddd;" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Enter Dashboard</button>
        </form>
        <div id="login-error" style="color: var(--danger-color); margin-top: 1rem; display: none;"></div>
        
        <div style="margin-top: 2rem; font-size: 0.8rem; color: var(--secondary-color);">
            <p>Admin: admin / admin123</p>
            <p>Nurse: nurse1 / nurse1123</p>
            <p>Doctor: doctor1 / doctor1123</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
