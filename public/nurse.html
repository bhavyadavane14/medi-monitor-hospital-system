<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurse Dashboard | MediMonitor</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar glass" id="sidebar">
            <div class="logo">
                <img src="images/logo.png" alt="Logo">
                <span>MediMonitor</span>
            </div>
            <nav style="margin-top: 2rem;">
                <ul style="flex-direction: column;">
                    <li><a href="#" class="active"><i class="fas fa-users"></i> Patients</a></li>
                    <li><a href="#" id="history-hamburger"><i class="fas fa-history"></i> Discharge History</a></li>
                    <li><a href="#" id="logout-btn" style="cursor: pointer;"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="glass" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <button id="menu-toggle" class="btn" style="display: none; font-size: 1.5rem;"><i class="fas fa-bars"></i></button>
                <h2>Nurse Dashboard - <span id="nurse-name">Loading...</span></h2>
            </header>

            <div class="stats-grid">
                <div class="stat-card glass">
                    <p>My Patients</p>
                    <h3 id="stat-patients">0</h3>
                </div>
                <div class="stat-card glass">
                    <p>Available Beds</p>
                    <h3 id="stat-beds">0</h3>
                </div>
            </div>

            <div class="glass" style="padding: 2rem; margin-bottom: 2rem;">
                <h3>Register New Patient</h3>
                <p style="font-size: 0.85rem; color: var(--secondary-color); margin-bottom: 1rem;">Admin will handle bed and doctor allocation after registration.</p>
                <form id="register-patient-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <input type="text" id="p-name" placeholder="Patient Name" class="glass" style="padding: 0.8rem;" required>
                    <input type="number" id="p-age" placeholder="Age" class="glass" style="padding: 0.8rem;" required>
                    <select id="p-gender" class="glass" style="padding: 0.8rem;">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Register Patient</button>
                </form>
            </div>

            <div class="glass" style="padding: 2rem;">
                <h3>My Assigned Patients</h3>
                <div style="margin: 1rem 0; display: flex; gap: 1rem;">
                    <input type="text" id="patient-search" placeholder="Search by name..." class="glass" style="padding: 0.5rem; flex: 1;">
                </div>
                <table id="nurse-patient-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Bed/Status</th>
                            <th>Severity</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Vitals Modal -->
    <div id="vitals-modal" class="glass" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 2rem; display: none; z-index: 1000; width: 500px;">
        <h3>Update Vitals: <span id="modal-patient-name"></span></h3>
        <form id="vitals-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
            <div><label>Heart Rate (bpm)</label><input type="number" id="v-hr" class="glass" style="width: 100%; padding: 0.5rem;" required></div>
            <div><label>BP (Systolic)</label><input type="number" id="v-bps" class="glass" style="width: 100%; padding: 0.5rem;" required></div>
            <div><label>BP (Diastolic)</label><input type="number" id="v-bpd" class="glass" style="width: 100%; padding: 0.5rem;" required></div>
            <div><label>Temp (°F)</label><input type="number" step="0.1" id="v-temp" class="glass" style="width: 100%; padding: 0.5rem;" required></div>
            <div><label>Oxygen (%)</label><input type="number" id="v-o2" class="glass" style="width: 100%; padding: 0.5rem;" required></div>
            <div style="grid-column: span 2;"><label>Medicine Given</label><input type="text" id="v-med" class="glass" style="width: 100%; padding: 0.5rem;"></div>
            <div style="grid-column: span 2;"><label>Notes</label><textarea id="v-notes" class="glass" style="width: 100%; padding: 0.5rem;"></textarea></div>
            <button type="submit" class="btn btn-primary" style="grid-column: span 2;">Save & Check Severity</button>
            <button type="button" onclick="closeVitalsModal()" class="btn" style="background: #eee;">Cancel</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
